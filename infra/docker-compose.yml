version: '3.8'

# Define custom network for all services to communicate
networks:
  quizcloud-network:
    driver: bridge

# Define volumes for persistence
volumes:
  postgres-question-data:
  postgres-quiz-data:
  rabbitmq-data:
  grafana-storage:

services:
  # ============ INFRASTRUCTURE SERVICES ============
  
  # PostgreSQL Database for Question Service
  postgres-question:
    image: postgres:16-alpine
    container_name: postgres-question
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: questiondb
    volumes:
      - postgres-question-data:/var/lib/postgresql/data
      - ../question-table-data.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quizcloud-network

  # PostgreSQL Database for Quiz Service
  postgres-quiz:
    image: postgres:16-alpine
    container_name: postgres-quiz
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: quizdb
    volumes:
      - postgres-quiz-data:/var/lib/postgresql/data
      - ../quiz-init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5433:5432"
    depends_on:
      postgres-question:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quizcloud-network

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    depends_on:
      postgres-quiz:
        condition: service_healthy
    networks:
      - quizcloud-network

  # ============ MICROSERVICES (in correct startup order) ============

  # 1. Config Server - Must start first
  config-server:
    build:
      context: ../config-server
      dockerfile: Dockerfile
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      - SERVER_PORT=8888
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 5
    networks:
      - quizcloud-network
    restart: unless-stopped

  # 2. Service Registry (Eureka)
  service-registry:
    build:
      context: ../service-registry
      dockerfile: Dockerfile
    container_name: service-registry
    ports:
      - "8761:8761"
    environment:
      - SERVER_PORT=8761
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 5
    networks:
      - quizcloud-network
    restart: unless-stopped

  # 3. Zipkin Server (Distributed Tracing)
  zipkin-server:
    build:
      context: ../zipkin-server
      dockerfile: Dockerfile
    container_name: zipkin-server
    ports:
      - "9411:9411"
    environment:
      - SERVER_PORT=9411
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
    depends_on:
      service-registry:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9411/health"]
      interval: 30s
      timeout: 3s
      retries: 5
    networks:
      - quizcloud-network
    restart: unless-stopped

  # 4. API Gateway
  api-gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin-server:9411/api/v2/spans
    depends_on:
      zipkin-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 5
    networks:
      - quizcloud-network
    restart: unless-stopped

  # 5. Question Service
  question-service:
    build:
      context: ../question-service
      dockerfile: Dockerfile
    container_name: question-service
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-question:5432/questiondb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin-server:9411/api/v2/spans
    depends_on:
      api-gateway:
        condition: service_healthy
      postgres-question:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 5
    networks:
      - quizcloud-network
    restart: unless-stopped

  # 6. Quiz Service
  quiz-service:
    build:
      context: ../quiz-service
      dockerfile: Dockerfile
    container_name: quiz-service
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-quiz:5432/quizdb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin-server:9411/api/v2/spans
    depends_on:
      api-gateway:
        condition: service_healthy
      postgres-quiz:
        condition: service_healthy
      question-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 5
    networks:
      - quizcloud-network
    restart: unless-stopped

  # ============ MONITORING SERVICES ============

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      quiz-service:
        condition: service_healthy
    networks:
      - quizcloud-network
    restart: unless-stopped

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - quizcloud-network
    restart: unless-stopped

